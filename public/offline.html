<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - SIAKAD CBT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Maaf, Anda sedang offline. Aplikasi CBT memerlukan koneksi internet untuk berfungsi dengan baik.</p>

        <div class="status">
            <span class="status-indicator"></span>
            <strong>Status:</strong> Offline
        </div>

        <button class="btn" onclick="location.reload()">
            🔄 Coba Lagi
        </button>

        <div class="info">
            <p><strong>💡 Tips:</strong></p>
            <ul style="text-align: left; list-style-position: inside;">
                <li>Periksa koneksi internet Anda</li>
                <li>Jawaban yang sudah disimpan akan tetap aman</li>
                <li>Jawaban akan otomatis terkirim saat koneksi kembali</li>
            </ul>
        </div>
    </div>

    <script>
        // Check connection status
        window.addEventListener('online', () => {
            location.reload();
        });

        // Auto-retry connection every 10 seconds
        setInterval(() => {
            if (navigator.onLine) {
                location.reload();
            }
        }, 10000);
    </script>
</body>

</html>
